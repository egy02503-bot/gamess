<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL 2: WORD FORGE</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-image: url(assests/level2_den/backgroundd.jpg); 
            display: flex; 
            justify-content: center; 
            align-items: center;    
        }

        .quiz-card { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            transition: all 0.3s ease;
        }

        button { 
            background: #007BFF; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 10px;
            font-size: 1rem;
        }

        button:hover { background: #0056b3; }

        button.secondary { 
            background: #6c757d; 
            margin-top: 10px;
        }

        button.secondary:hover { background: #5a6268; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 20px 0; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            text-align: center;
            font-size: 1rem;
        }

        .progress { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
        #feedback { font-weight: bold; margin: 15px 0; min-height: 1.2em; }
        .hidden { display: none; }
        h1 { color: #333; margin-bottom: 10px; }

        /* Badge Styling */
        .badge {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .badge-novice { background: linear-gradient(45deg, #8e9eab, #eef2f3); color: #333; }
        .badge-explorer { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .badge-seeker { background: linear-gradient(45deg, #FF512F, #DD2476); }
        .badge-master { background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; border: 2px solid #daa520; }
    </style>
</head>
<body>

<div class="quiz-card" id="quiz-box">
    <div id="main-menu">
        <h1>LEVEL 2: WORD FORGE</h1>
        <p>Pagsusuri ng Tula
Target: Tukuyin ang literal na kahulugan ng mga salitang ginamit sa tula,.</p>
        <button onclick="startQuiz()">Magsimula</button>
    </div>

    <div id="quiz-content" class="hidden">
        <div class="progress">Tanong <span id="q-number">1</span> ng 9</div>
        <h2 id="question-text">Loading...</h2>
        
        <input type="text" id="answerInput" placeholder="I-type ang sagot..." autofocus>
        
        <button onclick="processAnswer()">I-submit</button>
        <p id="feedback"></p>
    </div>
</div>

<script>
    const quizData = [
        { q: "Ano ang kahulugan ng 'Palayan'?", a: ["taniman ng palay", "kasipagan", "buhay sa kanayunan"] },
        { q: "Ano ang kahulugan ng 'Payong'?", a: ["panangga sa ulan ata araw", "proteksyon", "kalinga"] },
        { q: "Ano ang kahulugan ng 'Ilog'?", a: ["Tubig", "daloy ng oras", "katahimikan"] },
        { q: "Ano ang kahulugan ng 'Pamayanan'?", a: ["samahan", "kultura", "lugar ng sama-samang pamumuhay"] },
        { q: "Ano ang kahulugan ng 'Punong Kahoy'?", a: ["matangkad at matatag na halaman", "lakas","pagpupunyagi","katatagan"] },
        { q: "Ano ang kahulugan ng 'Araw'?", a: ["nagbibigay liwanag", "pag-asa","bagong simula"] },
        { q: "Ano ang kahulugan ng 'Dahon'?", a: ["halaman na sumisipsip ng liwang", "pagbabago","buhay","pag-uunlad"] },
        { q: "Ano ang kahulugan ng 'Tirahan'?", a: ["pamumuhay", "seguridad","kapayapaan","pahinga"] },
        { q: "Ano ang kahulugan ng 'Bunga'?", a: ["kinalabasan", "kabutihan","gantimpala","biyaya"] }
    ];

    let currentQ = 0;
    let totalScore = 0;
    const pointsPerQuestion = 11.12;

    const mainMenu = document.getElementById("main-menu");
    const quizContent = document.getElementById("quiz-content");
    const qText = document.getElementById("question-text");
    const qNum = document.getElementById("q-number");
    const input = document.getElementById("answerInput");
    const feedback = document.getElementById("feedback");

    function startQuiz() {
        currentQ = 0;
        totalScore = 0;
        mainMenu.classList.add("hidden");
        quizContent.classList.remove("hidden");
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ < quizData.length) {
            qText.textContent = quizData[currentQ].q;
            qNum.textContent = currentQ + 1;
            input.value = "";
            input.focus();
        } else {
            showFinalResults();
        }
    }

    function processAnswer() {
        if (input.value.trim() === "") return;

        const userValue = input.value.trim().toLowerCase();
        const correctAnswers = quizData[currentQ].a;

        if (correctAnswers.some(ans => userValue.includes(ans.toLowerCase()))) {
            totalScore += pointsPerQuestion;
            feedback.textContent = "Tama! ✨";
            feedback.style.color = "#28a745";
        } else {
            feedback.textContent = `Mali. (Sagot: ${correctAnswers[0]})`;
            feedback.style.color = "#dc3545";
        }

        currentQ++;

        setTimeout(() => {
            feedback.textContent = "";
            loadQuestion();
        }, 1200);
    }

    function getBadge(score) {
        if (score <= 25) return { name: "Novice Dreamer", class: "badge-novice" };
        if (score <= 50) return { name: "Word Explorer", class: "badge-explorer" };
        if (score <= 75) return { name: "Simbolismo Seeker", class: "badge-seeker" };
        return { name: "Konotasyon Master", class: "badge-master" };
    }

    function showFinalResults() {
        const finalScore = Math.round(totalScore);
        const badge = getBadge(finalScore);

        document.getElementById("quiz-box").innerHTML = `
            <h2>Tapos na!</h2>
            <p>Ang iyong kabuuang puntos ay:</p>
            <h1 style="font-size: 3.5rem; margin: 10px 0; color: #333;">${finalScore}</h1>
            <div class="badge ${badge.class}">${badge.name}</div>
            <div style="margin-top: 30px;">
                <button class="secondary" onclick="location.reload()">Bumalik sa Main Menu</button>
            </div>
        `;
    }

    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") processAnswer();
    });
</script>

</body>
</html>
