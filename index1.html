<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konotasyon Quest</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        /* This ensures only the titles look like links */
        .level-title-link {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            display: inline-block; /* Keeps the clickable area to the text size */
        }
        .level-title-link:hover {
            filter: brightness(1.5);
            text-shadow: 0 0 10px yellow; /* Optional "glow" effect */
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <div class="absolute lampbook"><img src="assests/conotasyon_nav/lampbook.png" alt="Lamp"></div>
        <div class="absolute main-title"><img src="assests/conotasyon_nav/KonDen Chronicles (4).png" alt="Title"></div>

        <a href="storyboard1.html"lass="level-title-link">
            <div class="absolute level-title lvl1-title">LEVEL 1: SYMBOL HUNT</div>
        </a>
        <div class="absolute lvl1-icons">
            <div class="icon-box"><img src="assests/conotasyon_nav/alikabok.png" alt="Alikabok"><div class="icon-text">Alikabok</div></div>
            <div class="icon-box"><img src="assests/conotasyon_nav/ilaw.png" alt="Ilaw"><div class="icon-text">Ilaw</div></div>
            <div class="icon-box"><img src="assests/conotasyon_nav/katahimikan.png" alt="Katahimikan"><div class="icon-text">Katahimikan</div></div>
            <div class="icon-box"><img src="assests/conotasyon_nav/libro.png" alt="Libro"><div class="icon-text">Libro</div></div>
            <div class="icon-box"><img src="assests/conotasyon_nav/orasan.png" alt="Orasan"><div class="icon-text">Orasan</div></div>
        </div>

        <div class="absolute journal"><img src="assests/conotasyon_nav/journal.png" alt="Journal"></div>
        <a href="storyboard2.html" class="level-title-link">
            <div class="absolute level-title lvl2-title">LEVEL 2: WORD FORGE</div>
        </a>
        <div class="absolute level-desc lvl2-desc">Bumuo ng Malikhaing Pangungusap!</div>

        <a href="level3con.html" class="level-title-link">
            <div class="absolute level-title lvl3-title">LEVEL 3: FILL IN THE BLANK</div>
        </a>
        <div class="absolute level-desc lvl3-desc">Kumpletuhin ang Nawawalang Salita!</div>

    
        <div class="absolute chest"><img src="assests/conotasyon_nav/chest.png" alt="Treasure Chest"></div>

        <div class="absolute legends-container">
            <div class="legend-title">LEGENDS</div>
            <div class="legend-item"><img src="assests/conotasyon_nav/masterss.png" alt="Master"><span>Konotasyon<br>Masters</span></div>
            <div class="legend-item"><img src="assests/conotasyon_nav/hat.png" alt="Seeker"><span>Simbolismo<br>Seekers</span></div>
            <div class="legend-item"><img src="assests/conotasyon_nav/explorer.png" alt="Explorer"><span>Word<br>Explorers</span></div>
            <div class="legend-item"><img src="assests/conotasyon_nav/dreamers.png" alt="Dreamer"><span>Novice<br>Dreamers</span></div>
        </div>

       <div class="absolute nextchapter-btn" style="bottom: 20px; right: 20px;">
    <a href="index2.html">
        <img src="assests/conotasyon_nav/nextchapter.png" alt="nextchapter" style="width: 120px;">
    </a>
</div>

    </div>

</body>
</html>
